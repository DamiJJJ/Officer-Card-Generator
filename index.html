<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Officer Card Generator</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <h1>OFFICER CARD GENERATOR</h1>
    <div class="container">
      <div class="form-panel">
        <h2>Officer Details</h2>

        <div class="form-group">
          <label>Photo</label>
          <div class="photo-upload" onclick="document.getElementById('photoInput').click()">
            <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(event)" />
            <span id="uploadText">Click to upload photo</span>
            <img id="photoPreview" class="photo-preview" alt="preview" />
          </div>
        </div>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="John Nolan" />
        </div>

        <div class="form-group">
          <label>Rank</label>
          <select id="rank">
            <option>Police Officer I</option>
            <option selected>Police Officer II</option>
            <option>Police Officer III</option>
            <option>Detective I</option>
            <option>Detective II</option>
            <option>Detective III</option>
            <option>Sergeant I</option>
            <option>Sergeant II</option>
            <option>Lieutenant I</option>
            <option>Lieutenant II</option>
            <option>Captain I</option>
            <option>Captain II</option>
            <option>Captain III</option>
            <option>Commander</option>
            <option>Deputy Chief</option>
            <option>Assistant Chief of Police</option>
            <option>Chief of Police</option>
          </select>
        </div>

        <div class="form-group">
          <label>Division</label>
          <select id="division">
            <option>Patrol Division</option>
            <option>Detective Bureau</option>
            <option>Metropolitan Division</option>
            <option>SWAT</option>
            <option>Traffic Division</option>
            <option>Air Support Division</option>
            <option>Gang and Narcotics Division</option>
            <option>Internal Affairs Division</option>
            <option>Major Crimes Division</option>
          </select>
        </div>

        <div style="display: flex; gap: 10px">
          <div class="form-group" style="flex: 1"><label>Serial #</label><input type="text" id="serial" placeholder="46212" /></div>
          <div class="form-group" style="flex: 1"><label>Badge #</label><input type="text" id="badge" placeholder="25486" /></div>
        </div>

        <div style="display: flex; gap: 10px">
          <div class="form-group" style="flex: 1">
            <label>Ethnicity</label>
            <select id="ethnicity">
              <option>White</option>
              <option>Black</option>
              <option>Hispanic</option>
              <option>Asian</option>
              <option>Middle Eastern</option>
              <option>Native American</option>
              <option>Mixed</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group" style="flex: 1">
            <label>Gender</label>
            <select id="gender">
              <option>Male</option>
              <option>Female</option>
              <option>Non-binary</option>
            </select>
          </div>
        </div>

        <div style="display: flex; gap: 10px">
          <div class="form-group" style="flex: 1">
            <label>Current Age</label>
            <input type="number" id="age" placeholder="27" min="21" max="75" />
          </div>
          <div class="form-group" style="flex: 1">
            <label>Year Hired</label>
            <select id="yearHired"></select>
          </div>
        </div>

        <div style="display: flex; gap: 10px">
          <div class="form-group" style="flex: 1"><label>Height</label><input type="text" id="height" placeholder='5&#39;9"' /></div>
          <div class="form-group" style="flex: 1"><label>Weight (lbs)</label><input type="text" id="weight" placeholder="195" /></div>
        </div>

        <div class="form-group" style="margin-top: 6px">
          <label>Payments</label>
          <button class="btn-random" onclick="randomizePay()">&#127922; Randomize Pay</button>
        </div>

        <div style="display: flex; gap: 8px">
          <div class="form-group" style="flex: 1"><label>Regular Pay</label><input type="text" id="payRegular" placeholder="$0.00" /></div>
          <div class="form-group" style="flex: 1"><label>Overtime Pay</label><input type="text" id="payOvertime" placeholder="$0.00" /></div>
        </div>
        <div style="display: flex; gap: 8px">
          <div class="form-group" style="flex: 1"><label>Other Pay</label><input type="text" id="payOther" placeholder="$0.00" /></div>
          <div class="form-group" style="flex: 1"><label>Health Benefits</label><input type="text" id="payHealth" placeholder="$0.00" /></div>
        </div>
        <div class="form-group">
          <label>Retirement Pay</label>
          <input type="text" id="payRetirement" placeholder="unknown" />
        </div>

        <button class="btn-generate" onclick="generateCard()">GENERATE CARD</button>
      </div>

      <div class="preview-panel">
        <h2>Preview</h2>
        <canvas id="cardCanvas" width="840" height="680"></canvas>
        <button class="btn-download" id="downloadBtn" onclick="downloadCard()">&#11015; Download PNG</button>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
