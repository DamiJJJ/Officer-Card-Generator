<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Dami" />
    <title>Firearm Discharge Investigation — GUMA Tools</title>

    <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" sizes="192x192" href="assets/favicon.ico" />
    <link rel="manifest" href="assets/manifest.json" />

    <script src="js/theme-init.js"></script>
    <script src="js/tailwind.js"></script>
    <script src="js/tailwind-config.js"></script>
    <script src="js/guma-styles.js"></script>
  </head>

  <body class="theme-navy-soft flex min-h-full flex-col">
    <guma-header></guma-header>

    <!-- PAGE TITLE -->
    <div class="guma-page pt-8 pb-4">
      <h1 class="text-center text-2xl font-black uppercase tracking-[0.16em] text-guma-l-gold dark:text-guma-gold md:text-3xl guma-page-title">
        Firearm Discharge Investigation
      </h1>
    </div>

    <!-- FACTION SWITCHER -->
    <div class="guma-page pb-4 guma-faction-switcher-wrap">
      <div id="factionSwitcher" class="flex flex-wrap justify-center gap-3"></div>
    </div>

    <!-- MAIN -->
    <main class="guma-page flex flex-1 flex-col gap-6 pb-10 xl:flex-row xl:items-start">
      <!-- LEFT: FORM PANEL -->
      <div class="guma-panel w-full p-6 xl:max-w-[580px] xl:flex-none guma-panel-form">
        <!-- Custom faction panel (hidden by default, shown by JS) -->
        <div
          id="customFactionPanel"
          style="display: none"
          class="mb-5 rounded-xl border border-guma-l-border-2 bg-guma-l-dark dark:border-guma-border-2 dark:bg-guma-dark p-4"
        >
          <p class="guma-form-section">Custom Faction Details</p>
          <div class="form-group">
            <label>Faction Name</label>
            <input type="text" id="customFactionName" placeholder="Los Angeles Police Department" oninput="applyCustomFaction()" />
          </div>
        </div>

        <!-- Incident type -->
        <p class="guma-form-section">Incident Type</p>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="checkbox" id="cb_tactical" /> Tactical Unintentional Discharge of a Firearm</label>
          <label class="checkbox-item"><input type="checkbox" id="cb_non_tactical" /> Non-Tactical Unintentional Discharge of a Firearm</label>
          <label class="checkbox-item"><input type="checkbox" id="cb_animal" /> Animal Shooting</label>
          <label class="checkbox-item"><input type="checkbox" id="cb_warning" /> Warning Shot</label>
        </div>

        <!-- Section I -->
        <p class="guma-form-section">Section I – General Information</p>

        <div class="two-col">
          <div class="form-group">
            <label>FID No.</label>
            <input type="text" id="fid_no" placeholder="00X-26" />
          </div>
          <div class="form-group">
            <label>DR No.</label>
            <input type="text" id="dr_no" placeholder="26-XXXXXXX" />
          </div>
        </div>

        <div class="two-col">
          <div class="form-group">
            <label>Date of Incident</label>
            <input type="date" id="date_incident" />
          </div>
          <div class="form-group">
            <label>Day of Week</label>
            <select id="day_of_week">
              <option value="-">-</option>
              <option>Monday</option>
              <option>Tuesday</option>
              <option>Wednesday</option>
              <option>Thursday</option>
              <option>Friday</option>
              <option>Saturday</option>
              <option>Sunday</option>
            </select>
          </div>
        </div>

        <div class="two-col">
          <div class="form-group">
            <label>Time (HH:MM)</label>
            <input type="time" id="time_incident" />
          </div>
          <div class="form-group">
            <label>RD</label>
            <input type="text" id="rd" placeholder="7065" />
          </div>
        </div>

        <div class="form-group">
          <label>Location of Occurrence</label>
          <input type="text" id="location" placeholder="Vespucci Blvd" />
        </div>

        <div class="two-col">
          <div class="form-group">
            <label>Date &amp; Time of Report</label>
            <input type="datetime-local" id="report_datetime" />
          </div>
          <div class="form-group">
            <label>Officer's Area/Division</label>
            <input type="text" id="officer_area" placeholder="Central" />
          </div>
        </div>

        <div class="form-group mb-5">
          <label>Area/Division of Occurrence</label>
          <input type="text" id="area_occurrence" placeholder="Southwest" />
        </div>

        <!-- Involved officers -->
        <p class="guma-form-section">Involved Officer(s)</p>
        <div id="involved-officers-container"></div>
        <div class="mb-5">
          <button type="button" class="btn-add" onclick="addOfficerRow('involved')">+ Add Involved Officer</button>
        </div>

        <!-- Witnessing officers -->
        <p class="guma-form-section">Witnessing Officer(s)</p>
        <div id="witnessing-officers-container"></div>
        <div class="mb-5">
          <button type="button" class="btn-add" onclick="addOfficerRow('witnessing')">+ Add Witnessing Officer</button>
        </div>

        <!-- Civilian witnesses -->
        <p class="guma-form-section">Civilian Witnesses</p>
        <div id="civilians-container"></div>
        <div class="mb-1">
          <button type="button" class="btn-add" onclick="addCivilianRow()">+ Add Civilian</button>
        </div>
      </div>

      <!-- RIGHT: PREVIEW PANEL -->
      <div class="guma-panel flex flex-1 flex-col items-center gap-5 p-6 guma-panel-preview">
        <p class="guma-form-section w-full self-start">Preview</p>

        <canvas id="docCanvas" class="h-auto w-full max-w-[640px] border border-slate-300 dark:border-slate-700 bg-white shadow-canvas"></canvas>

        <div class="flex w-full max-w-[640px] flex-col gap-3 sm:flex-row sm:items-stretch">
          <button type="button" class="guma-btn-primary flex-1" id="downloadBtn" onclick="downloadPng()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Download PNG
          </button>
          <button class="guma-btn-outline flex-1" id="copyDiscordBtn" onclick="copyDocToClipboard()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect width="8" height="4" x="8" y="2" rx="1" />
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
            </svg>
            Copy
          </button>
        </div>
        <div data-guma-counter hidden class="flex items-center justify-center gap-1.5 text-[11px] text-guma-l-muted/60 dark:text-guma-muted/60 mt-0.5">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="11"
            height="11"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect x="2" y="5" width="20" height="14" rx="2" />
            <line x1="2" y1="10" x2="22" y2="10" />
            <line x1="6" y1="15" x2="10" y2="15" />
            <line x1="6" y1="18" x2="14" y2="18" />
          </svg>
          Generated <span id="downloadCount">0</span> times
        </div>
      </div>
    </main>

    <guma-footer></guma-footer>

    <script src="js/factions.js"></script>
    <script src="js/ui-helpers.js"></script>
    <script src="js/firearm_discharge_investigation.js"></script>
    <script src="js/counters.js"></script>
    <script src="js/components.js"></script>
    <script src="js/animations.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        window.GumaCounters?.initDownloadCounter("firearm", "downloadCount", "downloadBtn");
      });
    </script>
  </body>
</html>
