<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Dami" />
    <title>Firearm Discharge Investigation — GUMA Tools</title>

    <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" sizes="192x192" href="assets/favicon.ico" />
    <link rel="manifest" href="assets/manifest.json" />

    <!-- Theme init (anti-FOUC) -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("guma-theme");
          var useDark = saved ? saved === "dark" : true; // dark = domyślny
          if (useDark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <script src="js/tailwind.js"></script>
    <script src="js/tailwind-config.js"></script>

    <style type="text/tailwindcss">
      @layer base {
        html {
          @apply h-full;
        }

        body {
          @apply min-h-full font-sans antialiased text-guma-l-text dark:text-guma-text;
          background-color: #f7f5ee;
          background-image:
            radial-gradient(circle at top, rgba(184, 134, 11, 0.07), transparent 28%), linear-gradient(180deg, #fefcf5 0%, #f7f5ee 40%, #efe9d8 100%);
          background-attachment: fixed;
        }

        html.dark body {
          background-color: #03034a;
          background-image:
            radial-gradient(circle at top, rgba(240, 192, 64, 0.08), transparent 28%), linear-gradient(180deg, #06305f 0%, #04045e 40%, #03154a 100%);
        }

        ::selection {
          background: rgba(184, 134, 11, 0.3);
          color: #1a1a2e;
        }
        html.dark ::selection {
          background: rgba(240, 192, 64, 0.35);
          color: #fff;
        }

        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator,
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
          cursor: pointer;
        }
        html.dark input[type="date"]::-webkit-calendar-picker-indicator,
        html.dark input[type="time"]::-webkit-calendar-picker-indicator,
        html.dark input[type="datetime-local"]::-webkit-calendar-picker-indicator {
          filter: invert(0.7);
        }

        input[type="checkbox"] {
          accent-color: #b8860b;
          width: 14px;
          height: 14px;
          cursor: pointer;
        }
        html.dark input[type="checkbox"] {
          accent-color: #f0c040;
        }
      }

      @layer components {
        .guma-page {
          @apply mx-auto w-full max-w-8xl px-4 sm:px-6 lg:px-8;
        }
        .guma-topbar {
          @apply sticky top-0 z-30 border-b backdrop-blur
             border-guma-l-border bg-guma-l-bg/80
             dark:border-white/10 dark:bg-guma-bg/80;
        }
        .guma-brand {
          @apply inline-flex items-center gap-3 no-underline text-guma-l-text dark:text-guma-text;
        }
        .guma-brand-mark {
          @apply inline-flex h-11 w-11 items-center justify-center rounded-2xl text-lg font-black
             border border-guma-l-gold/40 bg-guma-l-dark text-guma-l-gold
             dark:border-guma-gold/40 dark:bg-guma-dark dark:text-guma-gold;
        }
        .guma-panel {
          @apply rounded-2xl border
             border-guma-l-border bg-guma-l-panel shadow-panel-light
             dark:border-guma-border dark:bg-guma-panel dark:shadow-panel;
        }

        .guma-btn-back {
          @apply inline-flex items-center gap-1.5 rounded-lg border px-3 py-1.5 text-xs font-semibold transition
             border-guma-l-gold/50 bg-guma-l-input text-guma-l-gold hover:border-guma-l-gold hover:bg-guma-l-gold hover:text-white
             dark:border-guma-gold/50 dark:bg-guma-input dark:text-guma-gold dark:hover:border-guma-gold dark:hover:bg-guma-gold dark:hover:text-black;
        }
        .guma-btn-primary {
          @apply inline-flex h-full min-h-[42px] items-center justify-center gap-2 rounded-lg px-4 py-2.5 text-sm font-bold text-white transition hover:opacity-90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-guma-gold;
          background: linear-gradient(135deg, #f0c040, #c8960c);
          display: flex !important;
        }
        .guma-btn-outline {
          @apply inline-flex w-full items-center justify-center gap-2 rounded-lg border px-4 py-2.5 text-sm font-semibold transition
             border-guma-l-gold bg-guma-l-input text-guma-l-gold hover:bg-guma-l-gold hover:text-white
             focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-guma-l-gold
             dark:border-guma-gold dark:bg-guma-input dark:text-guma-gold dark:hover:bg-guma-gold dark:hover:text-black
             dark:focus-visible:ring-guma-gold;
        }
        .guma-btn-support {
          @apply inline-flex h-full min-h-[42px] items-center justify-center gap-2 rounded-lg px-4 py-2.5 text-sm font-bold text-white no-underline transition hover:opacity-90;
          background: linear-gradient(135deg, #6cdd5e, #4ab034);
        }

        .guma-form-section {
          @apply mb-4 border-b pb-2 text-[11px] font-bold uppercase tracking-[0.16em]
             border-guma-l-border text-guma-l-gold
             dark:border-guma-border dark:text-guma-gold;
        }

        .faction-btn {
          @apply flex w-24 cursor-pointer flex-col items-center gap-1.5 rounded-xl border-2 py-2.5 text-[11px] font-bold uppercase tracking-wider transition
             border-guma-l-border bg-guma-l-panel text-guma-l-muted hover:border-guma-l-gold hover:text-guma-l-gold
             dark:border-guma-border dark:bg-guma-panel dark:text-guma-muted dark:hover:border-guma-gold dark:hover:text-guma-gold;
        }
        .faction-btn.active {
          @apply border-guma-l-gold bg-guma-l-panel-2 text-guma-l-gold
             dark:border-guma-gold dark:bg-guma-panel-2 dark:text-guma-gold;
        }

        .dynamic-row {
          @apply relative mb-3 rounded-xl border p-4
             border-guma-l-border-2 bg-guma-l-dark
             dark:border-guma-border-2 dark:bg-guma-dark;
        }
        .row-title {
          @apply mb-3 text-[11px] font-bold uppercase tracking-[0.14em] text-guma-l-gold dark:text-guma-gold;
        }
        .btn-remove-row {
          @apply absolute right-3 top-3 inline-flex items-center justify-center rounded-md bg-guma-danger px-2 py-0.5 text-[11px] font-semibold text-white transition hover:bg-guma-danger-h;
        }
        .btn-add {
          @apply inline-flex w-full items-center justify-center rounded-lg border border-dashed px-4 py-2 text-xs font-semibold uppercase tracking-[0.12em] transition
             border-guma-l-gold bg-guma-l-input text-guma-l-gold hover:bg-guma-l-panel-2
             focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-guma-l-gold
             dark:border-guma-gold dark:bg-guma-input dark:text-guma-gold dark:hover:bg-guma-panel-2
             dark:focus-visible:ring-guma-gold;
        }

        .form-group {
          @apply mb-3 flex flex-col justify-end;
        }
        .form-group label {
          @apply mb-1 block text-[11px] font-semibold uppercase tracking-[0.12em] text-guma-l-muted dark:text-guma-muted;
        }
        .form-group input,
        .form-group select {
          @apply w-full rounded-lg border px-3 py-2 text-sm transition appearance-auto
             border-guma-l-border-2 bg-guma-l-input text-guma-l-text placeholder:text-guma-l-muted/60
             focus:border-guma-l-gold focus:ring-1 focus:ring-guma-l-gold/40 focus:outline-none
             dark:border-guma-border-2 dark:bg-guma-input dark:text-white dark:placeholder:text-slate-500
             dark:focus:border-guma-gold dark:focus:ring-guma-gold/40;
        }
        .two-col {
          @apply grid grid-cols-2 gap-3;
        }
        .three-col {
          @apply grid grid-cols-3 gap-3;
        }

        .checkbox-group {
          @apply mb-5 flex flex-col gap-2;
        }
        .checkbox-item {
          @apply flex cursor-pointer items-center gap-2 text-sm select-none text-guma-l-text dark:text-guma-text;
        }
      }

      @layer utilities {
        .border-guma-border-2 {
          border-color: #2a2a5a;
        }
        .border-guma-l-border-2 {
          border-color: #d4cdb4;
        }
      }
    </style>
  </head>

  <body class="flex min-h-full flex-col">
    <guma-header></guma-header>

    <!-- PAGE TITLE -->
    <div class="guma-page pt-8 pb-4">
      <h1 class="text-center text-2xl font-black uppercase tracking-[0.16em] text-guma-l-gold dark:text-guma-gold md:text-3xl guma-page-title">
        Firearm Discharge Investigation
      </h1>
    </div>

    <!-- FACTION SWITCHER -->
    <div class="guma-page pb-4 guma-faction-switcher-wrap">
      <div id="factionSwitcher" class="flex flex-wrap justify-center gap-3"></div>
    </div>

    <!-- MAIN -->
    <main class="guma-page flex flex-1 flex-col gap-6 pb-10 xl:flex-row xl:items-start">
      <!-- LEFT: FORM PANEL -->
      <div class="guma-panel w-full p-6 xl:max-w-[580px] xl:flex-none guma-panel-form">
        <!-- Custom faction panel (hidden by default, shown by JS) -->
        <div
          id="customFactionPanel"
          style="display: none"
          class="mb-5 rounded-xl border border-guma-l-border-2 bg-guma-l-dark dark:border-guma-border-2 dark:bg-guma-dark p-4"
        >
          <p class="guma-form-section">Custom Faction Details</p>
          <div class="form-group">
            <label>Faction Name</label>
            <input type="text" id="customFactionName" placeholder="Los Angeles Police Department" oninput="applyCustomFaction()" />
          </div>
        </div>

        <!-- Incident type -->
        <p class="guma-form-section">Incident Type</p>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="checkbox" id="cb_tactical" /> Tactical Unintentional Discharge of a Firearm</label>
          <label class="checkbox-item"><input type="checkbox" id="cb_non_tactical" /> Non-Tactical Unintentional Discharge of a Firearm</label>
          <label class="checkbox-item"><input type="checkbox" id="cb_animal" /> Animal Shooting</label>
          <label class="checkbox-item"><input type="checkbox" id="cb_warning" /> Warning Shot</label>
        </div>

        <!-- Section I -->
        <p class="guma-form-section">Section I – General Information</p>

        <div class="two-col">
          <div class="form-group">
            <label>FID No.</label>
            <input type="text" id="fid_no" placeholder="00X-26" />
          </div>
          <div class="form-group">
            <label>DR No.</label>
            <input type="text" id="dr_no" placeholder="26-XXXXXXX" />
          </div>
        </div>

        <div class="two-col">
          <div class="form-group">
            <label>Date of Incident</label>
            <input type="date" id="date_incident" />
          </div>
          <div class="form-group">
            <label>Day of Week</label>
            <select id="day_of_week">
              <option value="-">-</option>
              <option>Monday</option>
              <option>Tuesday</option>
              <option>Wednesday</option>
              <option>Thursday</option>
              <option>Friday</option>
              <option>Saturday</option>
              <option>Sunday</option>
            </select>
          </div>
        </div>

        <div class="two-col">
          <div class="form-group">
            <label>Time (HH:MM)</label>
            <input type="time" id="time_incident" />
          </div>
          <div class="form-group">
            <label>RD</label>
            <input type="text" id="rd" placeholder="7065" />
          </div>
        </div>

        <div class="form-group">
          <label>Location of Occurrence</label>
          <input type="text" id="location" placeholder="Vespucci Blvd" />
        </div>

        <div class="two-col">
          <div class="form-group">
            <label>Date &amp; Time of Report</label>
            <input type="datetime-local" id="report_datetime" />
          </div>
          <div class="form-group">
            <label>Officer's Area/Division</label>
            <input type="text" id="officer_area" placeholder="Central" />
          </div>
        </div>

        <div class="form-group mb-5">
          <label>Area/Division of Occurrence</label>
          <input type="text" id="area_occurrence" placeholder="Southwest" />
        </div>

        <!-- Involved officers -->
        <p class="guma-form-section">Involved Officer(s)</p>
        <div id="involved-officers-container"></div>
        <div class="mb-5">
          <button type="button" class="btn-add" onclick="addOfficerRow('involved')">+ Add Involved Officer</button>
        </div>

        <!-- Witnessing officers -->
        <p class="guma-form-section">Witnessing Officer(s)</p>
        <div id="witnessing-officers-container"></div>
        <div class="mb-5">
          <button type="button" class="btn-add" onclick="addOfficerRow('witnessing')">+ Add Witnessing Officer</button>
        </div>

        <!-- Civilian witnesses -->
        <p class="guma-form-section">Civilian Witnesses</p>
        <div id="civilians-container"></div>
        <div class="mb-1">
          <button type="button" class="btn-add" onclick="addCivilianRow()">+ Add Civilian</button>
        </div>
      </div>

      <!-- RIGHT: PREVIEW PANEL -->
      <div class="guma-panel flex flex-1 flex-col items-center gap-5 p-6 guma-panel-preview">
        <p class="guma-form-section w-full self-start">Preview</p>

        <canvas id="docCanvas" class="h-auto w-full max-w-[640px] border border-slate-300 dark:border-slate-700 bg-white shadow-canvas"></canvas>

        <div class="flex w-full max-w-[640px] flex-col gap-3 sm:flex-row sm:items-stretch">
          <button type="button" class="guma-btn-primary flex-1" id="downloadBtn" onclick="downloadPng()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Download PNG
          </button>
          <button class="guma-btn-outline flex-1" id="copyDiscordBtn" onclick="copyDocToClipboard()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect width="8" height="4" x="8" y="2" rx="1" />
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
            </svg>
            Copy
          </button>
        </div>
        <div data-guma-counter hidden class="flex items-center justify-center gap-1.5 text-[11px] text-guma-l-muted/60 dark:text-guma-muted/60 mt-0.5">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="11"
            height="11"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect x="2" y="5" width="20" height="14" rx="2" />
            <line x1="2" y1="10" x2="22" y2="10" />
            <line x1="6" y1="15" x2="10" y2="15" />
            <line x1="6" y1="18" x2="14" y2="18" />
          </svg>
          Generated <span id="downloadCount">0</span> times
        </div>
      </div>
    </main>

    <guma-footer></guma-footer>

    <script src="js/factions.js"></script>
    <script src="js/ui-helpers.js"></script>
    <script src="js/firearm_discharge_investigation.js"></script>
    <script src="js/counters.js"></script>
    <script src="js/components.js"></script>
    <script src="js/animations.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        window.GumaCounters?.initDownloadCounter("firearm", "downloadCount", "downloadBtn");
      });
    </script>
  </body>
</html>
