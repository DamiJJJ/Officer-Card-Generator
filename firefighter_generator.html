<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="authors" content="Dami" />
    <title>Guma LEA Generator</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- Favicon -->
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
    <!-- Apple/iOS/Android (192x192px) -->
    <link rel="apple-touch-icon" sizes="192x192" href="assets/favicon.ico" />
    <!-- Safari pinned tab -->
    <link rel="mask-icon" href="assets/favicon.ico" color="#f0c040" />
    <link rel="manifest" href="assets/manifest.json" />
  </head>
  <body data-faction="lscofd">
    <button onclick="history.back()" class="btn-back">&larr; Go Back</button>
    <h2>FIREFIGHTER CARD GENERATOR</h2>

    <!-- Faction switcher -->
    <div class="faction-switcher" id="factionSwitcher"></div>

    <div class="container">
      <div class="form-panel">
        <div id="customFactionPanel" style="display: none">
          <h3>Custom Faction Details</h3>

          <div class="form-group">
            <label>Rank</label>
            <input type="text" id="customRank" placeholder="Captain" oninput="applyCustomFaction()" />
          </div>

          <div class="form-group">
            <label>Division</label>
            <input type="text" id="customDivision" placeholder="Rescue Division" oninput="applyCustomFaction()" />
          </div>

          <div class="form-group">
            <label>Email Domain</label>
            <input type="text" id="customEmailDomain" placeholder="lapd.online" oninput="applyCustomFaction()" />
          </div>
        </div>

        <h3>Firefighter Details</h3>

        <div class="form-group">
          <label>Photo</label>
          <div class="photo-upload" onclick="document.getElementById('photoInput').click()">
            <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(event)" />
            <span id="uploadText">Click to upload photo</span>
            <img id="photoPreview" class="photo-preview" alt="preview" />
          </div>
        </div>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="John Nolan" />
        </div>

        <div class="form-group">
          <label>Rank</label>
          <select id="rank"></select>
        </div>

        <div class="form-group">
          <label>Division</label>
          <select id="division"></select>
        </div>

        <div style="display: flex; gap: 10px">
          <div class="form-group" style="flex: 1"><label>Serial #</label><input type="text" id="serial" placeholder="46212" /></div>
          <div class="form-group" style="flex: 1"><label>Badge #</label><input type="text" id="badge" placeholder="25486" /></div>
        </div>

        <div style="display: flex; gap: 10px">
          <div class="form-group" style="flex: 1">
            <label>Ethnicity</label>
            <select id="ethnicity">
              <option>White</option>
              <option>Black</option>
              <option>Hispanic</option>
              <option>Asian</option>
              <option>Middle Eastern</option>
              <option>Native American</option>
              <option>Mixed</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group" style="flex: 1">
            <label>Gender</label>
            <select id="gender">
              <option>Male</option>
              <option>Female</option>
              <option>Non-binary</option>
            </select>
          </div>
        </div>

        <div style="display: flex; gap: 10px">
          <div class="form-group" style="flex: 1">
            <label>Current Age</label>
            <input type="number" id="age" placeholder="27" min="21" max="75" />
          </div>
          <div class="form-group" style="flex: 1">
            <label>Year Hired</label>
            <select id="yearHired"></select>
          </div>
        </div>

        <div style="display: flex; gap: 10px">
          <div class="form-group" style="flex: 1"><label>Height</label><input type="text" id="height" placeholder='5&#39;9"' /></div>
          <div class="form-group" style="flex: 1"><label>Weight (lbs)</label><input type="text" id="weight" placeholder="195lbs" /></div>
        </div>

        <div class="form-group" style="margin-top: 6px">
          <label>Payments</label>
          <button class="btn-random" onclick="randomizePay()">&#127922; Randomize Pay</button>
        </div>

        <div style="display: flex; gap: 8px">
          <div class="form-group" style="flex: 1"><label>Regular Pay</label><input type="text" id="payRegular" placeholder="$0.00" /></div>
          <div class="form-group" style="flex: 1"><label>Overtime Pay</label><input type="text" id="payOvertime" placeholder="$0.00" /></div>
        </div>
        <div style="display: flex; gap: 8px">
          <div class="form-group" style="flex: 1"><label>Other Pay</label><input type="text" id="payOther" placeholder="$0.00" /></div>
          <div class="form-group" style="flex: 1"><label>Health Benefits</label><input type="text" id="payHealth" placeholder="$0.00" /></div>
        </div>
        <div class="form-group">
          <label>Retirement Pay</label>
          <input type="text" id="payRetirement" placeholder="unknown" />
        </div>
      </div>

      <div class="preview-panel">
        <h3>Preview</h3>
        <canvas id="cardCanvas" width="840" height="680"></canvas>
        <div class="btn-row">
          <button class="btn-download" id="downloadBtn" onclick="downloadCard()">&#11015; Download PNG</button>
          <a href="https://tipply.pl/@dami" target="_blank" rel="noopener noreferrer" class="btn-download btn-support">&#9749; Support project</a>
        </div>
      </div>
    </div>

        <span class="footer-text">Guma LEA Generator v1.4 &copy; Dami 2026</span>

              />

            <!-- Twitch icon -->

              />
            </svg>
          </a>
        </div>
      </div>
    </footer>

    <script src="js/factions.js"></script>
    <script src="js/ui-helpers.js"></script>
    <script src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        initGenerator({
          factionType: FACTION_TYPE.FIRE,
          defaultFaction: "lscofd",
        });
      });
    </script>
  </body>
</html>
