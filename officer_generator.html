<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Dami" />
    <title>Officer Card Generator — GUMA Tools</title>

    <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" sizes="192x192" href="assets/favicon.ico" />
    <link rel="manifest" href="manifest.json" />

    <script src="js/tailwind.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "guma-bg": "#04045e",
              "guma-panel": "#16213e",
              "guma-panel-2": "#1a2a4a",
              "guma-input": "#0f3460",
              "guma-dark": "#0f1e3d",
              "guma-footer": "#020338",
              "guma-gold": "#f0c040",
              "guma-gold-dark": "#c8960c",
              "guma-border": "#2a2a4a",
              "guma-border-2": "#2a2a5a",
              "guma-text": "#eeeeee",
              "guma-muted": "#aaaaaa",
              "guma-danger": "#7b0000",
            },
            boxShadow: {
              panel: "0 12px 32px rgba(0,0,0,.28)",
              canvas: "0 4px 24px rgba(0,0,0,.5)",
            },
            maxWidth: {
              "8xl": "1400px",
            },
            fontFamily: {
              sans: ["Segoe UI", "Arial", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style type="text/tailwindcss">
      @layer base {
        html {
          @apply h-full;
        }
        body {
          @apply min-h-full text-guma-text font-sans antialiased;
          background-color: #03034a; /* kolor końcowy gradientu jako fallback */
          background-image:
            radial-gradient(circle at top, rgba(240, 192, 64, 0.08), transparent 28%), linear-gradient(180deg, #06305f 0%, #04045e 40%, #03154a 100%);
          background-attachment: fixed; /* gradient nie "przewija się" ze stroną */
        }

        ::selection {
          background: rgba(240, 192, 64, 0.35);
          color: #fff;
        }
      }

      @layer components {
        /* ── Layout ── */
        .guma-page {
          @apply mx-auto w-full max-w-8xl px-4 sm:px-6 lg:px-8;
        }

        /* ── Topbar ── */
        .guma-topbar {
          @apply sticky top-0 z-30 border-b border-white/10 bg-guma-bg/80 backdrop-blur;
        }
        .guma-brand {
          @apply inline-flex items-center gap-3 text-guma-text no-underline;
        }
        .guma-brand-mark {
          @apply inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-guma-gold/40 bg-guma-dark text-lg font-black text-guma-gold;
        }

        /* ── Panels ── */
        .guma-panel {
          @apply rounded-2xl border border-guma-border bg-guma-panel shadow-panel;
        }

        /* ── Form elements ── */
        .guma-label {
          @apply mb-1 block text-[11px] font-semibold uppercase tracking-[0.12em] text-guma-muted;
        }
        .guma-input {
          @apply w-full rounded-lg border border-guma-border-2 bg-guma-input px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:border-guma-gold focus:ring-1 focus:ring-guma-gold/40 focus:outline-none transition;
        }
        .guma-select {
          @apply guma-input appearance-auto;
        }

        /* ── Buttons ── */
        .guma-btn-outline {
          @apply inline-flex w-full items-center justify-center gap-2 rounded-lg border border-guma-gold bg-guma-input px-4 py-2 text-sm font-semibold text-guma-gold transition hover:bg-guma-gold hover:text-black focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-guma-gold;
        }
        .guma-btn-primary {
          @apply inline-flex h-full min-h-[42px] items-center justify-center gap-2 rounded-lg px-4 py-2.5 text-sm font-bold text-white transition hover:opacity-90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-guma-gold;
          background: linear-gradient(135deg, #f0c040, #c8960c);
          display: flex !important;
        }
        .guma-btn-support {
          @apply inline-flex h-full min-h-[42px] items-center justify-center gap-2 rounded-lg px-4 py-2.5 text-sm font-bold text-white no-underline transition hover:opacity-90;
          background: linear-gradient(135deg, #6cdd5e, #4ab034);
        }
        .guma-btn-back {
          @apply inline-flex items-center gap-1.5 rounded-lg border border-guma-gold/50 bg-guma-input px-3 py-1.5 text-xs font-semibold text-guma-gold transition hover:border-guma-gold hover:bg-guma-gold hover:text-black;
        }

        /* ── Form section header ── */
        .guma-form-section {
          @apply mb-1 border-b border-guma-border pb-2 text-[11px] font-bold uppercase tracking-[0.16em] text-guma-gold;
        }

        /* ── Faction button ── */
        .faction-btn {
          @apply flex w-24 cursor-pointer flex-col items-center gap-1.5 rounded-xl border-2 border-guma-border bg-guma-panel py-2.5 text-[11px] font-bold uppercase tracking-wider text-guma-muted transition hover:border-guma-gold hover:text-guma-gold;
        }
        .faction-btn.active {
          @apply border-guma-gold bg-guma-panel-2 text-guma-gold;
        }
      }

      @layer utilities {
        .border-guma-border-2 {
          border-color: #2a2a5a;
        }
      }

      /* Picker icon kolor na dark tle */
      input[type="date"]::-webkit-calendar-picker-indicator,
      input[type="time"]::-webkit-calendar-picker-indicator,
      input[type="datetime-local"]::-webkit-calendar-picker-indicator {
        filter: invert(0.7);
        cursor: pointer;
      }

      /* Checkbox accent */
      input[type="checkbox"] {
        accent-color: #f0c040;
      }
    </style>
  </head>

  <body class="flex min-h-full flex-col">
    <!-- ── Topbar ── -->
    <guma-header></guma-header>

    <!-- ── Page title ── -->
    <div class="guma-page pt-8 pb-4">
      <h1 class="text-center text-2xl font-black uppercase tracking-[0.2em] text-guma-gold md:text-3xl">Officer Card Generator</h1>
    </div>

    <!-- ── Faction Switcher ── -->
    <div class="guma-page pb-4">
      <div id="factionSwitcher" class="flex flex-wrap justify-center gap-3"></div>
    </div>

    <!-- ── Main layout ── -->
    <main class="guma-page flex flex-1 flex-col gap-6 pb-10 xl:flex-row xl:items-start">
      <!-- ════ FORM PANEL ════ -->
      <div class="guma-panel w-full p-6 xl:w-[480px] xl:flex-none">
        <!-- Custom Faction Panel -->
        <div id="customFactionPanel" style="display: none" class="mb-5 rounded-xl border border-guma-border-2 bg-guma-dark p-4">
          <p class="guma-form-section">Custom Faction Details</p>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="guma-label">Rank</label>
              <input class="guma-input" type="text" id="customRank" placeholder="Captain" oninput="applyCustomFaction()" />
            </div>
            <div>
              <label class="guma-label">Division</label>
              <input class="guma-input" type="text" id="customDivision" placeholder="Rescue Division" oninput="applyCustomFaction()" />
            </div>
            <div class="col-span-2">
              <label class="guma-label">Email Domain</label>
              <input class="guma-input" type="text" id="customEmailDomain" placeholder="lapd.online" oninput="applyCustomFaction()" />
            </div>
          </div>
        </div>

        <!-- Officer Details -->
        <p class="guma-form-section mb-4">Officer Details</p>

        <!-- Photo Upload -->
        <div class="mb-4">
          <label class="guma-label">Photo</label>
          <div
            class="flex cursor-pointer flex-col items-center justify-center rounded-xl border-2 border-dashed border-guma-border px-4 py-5 text-center text-sm text-guma-muted transition hover:border-guma-gold hover:text-guma-gold"
            onclick="document.getElementById('photoInput').click()"
          >
            <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="previewPhoto(event)" />
            <span id="uploadText">Click to upload photo</span>
            <img id="photoPreview" class="mt-2 hidden h-[120px] w-[100px] rounded object-cover" alt="preview" />
          </div>
        </div>

        <!-- Full Name -->
        <div class="mb-3">
          <label class="guma-label" for="fullName">Full Name</label>
          <input class="guma-input" type="text" id="fullName" placeholder="John Nolan" />
        </div>

        <!-- Rank + Division -->
        <div class="mb-3 grid grid-cols-2 gap-3">
          <div>
            <label class="guma-label" for="rank">Rank</label>
            <select class="guma-select" id="rank"></select>
          </div>
          <div>
            <label class="guma-label" for="division">Division</label>
            <select class="guma-select" id="division"></select>
          </div>
        </div>

        <!-- Serial + Badge -->
        <div class="mb-3 grid grid-cols-2 gap-3">
          <div>
            <label class="guma-label" for="serial">Serial #</label>
            <input class="guma-input" type="text" id="serial" placeholder="46212" />
          </div>
          <div>
            <label class="guma-label" for="badge">Badge #</label>
            <input class="guma-input" type="text" id="badge" placeholder="25486" />
          </div>
        </div>

        <!-- Ethnicity + Gender -->
        <div class="mb-3 grid grid-cols-2 gap-3">
          <div>
            <label class="guma-label" for="ethnicity">Ethnicity</label>
            <select class="guma-select" id="ethnicity">
              <option>White</option>
              <option>Black</option>
              <option>Hispanic</option>
              <option>Asian</option>
              <option>Middle Eastern</option>
              <option>Native American</option>
              <option>Mixed</option>
              <option>Other</option>
            </select>
          </div>
          <div>
            <label class="guma-label" for="gender">Gender</label>
            <select class="guma-select" id="gender">
              <option>Male</option>
              <option>Female</option>
              <option>Non-binary</option>
            </select>
          </div>
        </div>

        <!-- Age + Year Hired -->
        <div class="mb-3 grid grid-cols-2 gap-3">
          <div>
            <label class="guma-label" for="age">Current Age</label>
            <input class="guma-input" type="number" id="age" placeholder="27" min="21" max="75" />
          </div>
          <div>
            <label class="guma-label" for="yearHired">Year Hired</label>
            <select class="guma-select" id="yearHired"></select>
          </div>
        </div>

        <!-- Height + Weight -->
        <div class="mb-5 grid grid-cols-2 gap-3">
          <div>
            <label class="guma-label" for="height">Height</label>
            <input class="guma-input" type="text" id="height" placeholder="5'9&quot;" />
          </div>
          <div>
            <label class="guma-label" for="weight">Weight (lbs)</label>
            <input class="guma-input" type="text" id="weight" placeholder="195lbs" />
          </div>
        </div>

        <!-- Payments -->
        <p class="guma-form-section mb-4">Payments</p>

        <div class="mb-3">
          <button class="guma-btn-outline" onclick="randomizePay()">🎲 Randomize Pay</button>
        </div>

        <div class="mb-3 grid grid-cols-2 gap-3">
          <div>
            <label class="guma-label" for="payRegular">Regular Pay</label>
            <input class="guma-input" type="text" id="payRegular" placeholder="$0.00" />
          </div>
          <div>
            <label class="guma-label" for="payOvertime">Overtime Pay</label>
            <input class="guma-input" type="text" id="payOvertime" placeholder="$0.00" />
          </div>
        </div>
        <div class="mb-3 grid grid-cols-2 gap-3">
          <div>
            <label class="guma-label" for="payOther">Other Pay</label>
            <input class="guma-input" type="text" id="payOther" placeholder="$0.00" />
          </div>
          <div>
            <label class="guma-label" for="payHealth">Health Benefits</label>
            <input class="guma-input" type="text" id="payHealth" placeholder="$0.00" />
          </div>
        </div>
        <div class="mb-1">
          <label class="guma-label" for="payRetirement">Retirement Pay</label>
          <input class="guma-input" type="text" id="payRetirement" placeholder="unknown" />
        </div>

        <!-- ── Employment History ── -->
        <div class="mt-6 border-t border-guma-border pt-5">
          <label class="flex cursor-pointer select-none items-center gap-2.5">
            <input type="checkbox" id="attachEmploymentHistory" onchange="toggleEmploymentHistory()" />
            <span class="text-[11px] font-bold uppercase tracking-[0.16em] text-guma-gold">Attach Employment History</span>
          </label>
        </div>

        <div id="employmentHistorySection" class="hidden mt-4 space-y-3">
          <div id="employmentRows"></div>
          <button type="button" class="guma-btn-outline mt-1" onclick="addEmploymentRow()">+ Add Row</button>
        </div>
      </div>

      <!-- ════ PREVIEW PANEL ════ -->
      <div class="guma-panel flex flex-1 flex-col items-center gap-5 p-6">
        <p class="self-start guma-form-section w-full">Preview</p>

        <canvas id="cardCanvas" width="840" height="680" class="w-full max-w-[500px] shadow-canvas"></canvas>

        <div class="flex w-full max-w-[500px] flex-col gap-3 sm:flex-row sm:items-stretch">
          <button class="guma-btn-primary flex-1" id="downloadBtn" onclick="downloadCard()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Download PNG
          </button>
        </div>
        <div data-guma-counter hidden class="flex items-center justify-center gap-1.5 text-[11px] text-guma-muted/60 mt-0.5">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="11"
            height="11"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect x="2" y="5" width="20" height="14" rx="2" />
            <line x1="2" y1="10" x2="22" y2="10" />
            <line x1="6" y1="15" x2="10" y2="15" />
            <line x1="6" y1="18" x2="14" y2="18" />
          </svg>
          Generated <span id="downloadCount">0</span> times
        </div>
      </div>
    </main>

    <guma-footer></guma-footer>
    <script src="js/counters.js"></script>
    <script src="js/components.js"></script>
    <script src="js/factions.js"></script>
    <script src="js/ui-helpers.js"></script>
    <script src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        initGenerator({
          factionType: FACTION_TYPE.POLICE,
          defaultFaction: "lspd",
        });
        window.GumaCounters?.initDownloadCounter("officer", "downloadCount", "downloadBtn");
      });
    </script>
  </body>
</html>
