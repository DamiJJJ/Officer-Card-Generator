<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Officer Card Generator</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, sans-serif;
        background: #04045e;
        color: #eee;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 30px 20px;
      }
      h1 {
        color: #f0c040;
        margin-bottom: 24px;
        font-size: 1.6rem;
        letter-spacing: 2px;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
        width: 100%;
        max-width: 1000px;
      }
      .form-panel {
        background: #16213e;
        border-radius: 10px;
        padding: 24px;
        width: 380px;
      }
      .form-panel h2 {
        color: #f0c040;
        font-size: 1rem;
        margin-bottom: 16px;
        letter-spacing: 1px;
      }
      .form-group {
        margin-bottom: 12px;
      }
      .form-group label {
        display: block;
        font-size: 0.78rem;
        color: #aaa;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 8px 10px;
        border-radius: 5px;
        border: 1px solid #334;
        background: #0f3460;
        color: #fff;
        font-size: 0.9rem;
      }
      .form-group input::placeholder {
        color: #667;
      }
      .photo-upload {
        border: 2px dashed #334;
        border-radius: 8px;
        padding: 16px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .photo-upload:hover {
        border-color: #f0c040;
      }
      .photo-upload input {
        display: none;
      }
      .photo-preview {
        width: 100px;
        height: 120px;
        object-fit: cover;
        border-radius: 4px;
        margin-top: 8px;
        display: none;
      }
      .btn-random {
        background: #0f3460;
        border: 1px solid #f0c040;
        color: #f0c040;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.78rem;
        margin-top: 4px;
        width: 100%;
      }
      .btn-random:hover {
        background: #f0c040;
        color: #000;
      }
      .btn-generate {
        width: 100%;
        padding: 12px;
        background: #f0c040;
        color: #000;
        font-weight: bold;
        font-size: 1rem;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 16px;
        letter-spacing: 1px;
        transition: background 0.2s;
      }
      .btn-generate:hover {
        background: #d4a800;
      }
      .preview-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .preview-panel h2 {
        color: #f0c040;
        font-size: 1rem;
        letter-spacing: 1px;
        align-self: flex-start;
      }
      #cardCanvas {
        border-radius: 8px;
        box-shadow: 0 4px 24px #0008;
        width: 500px;
        height: auto;
        max-width: 100%;
      }
      .btn-download {
        background: #27ae60;
        color: #fff;
        font-weight: bold;
        padding: 10px 28px;
        border: none;
        border-radius: 6px;
        font-size: 0.95rem;
        cursor: pointer;
        letter-spacing: 1px;
        display: none;
      }
      .btn-download:hover {
        background: #1e8449;
      }
    </style>
  </head>
  <body>
    <h1>OFFICER CARD GENERATOR</h1>
    <div class="container">
      <div class="form-panel">
        <h2>Officer Details</h2>

        <div class="form-group">
          <label>Photo</label>
          <div class="photo-upload" onclick="document.getElementById('photoInput').click()">
            <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(event)" />
            <span id="uploadText">Click to upload photo</span>
            <img id="photoPreview" class="photo-preview" alt="preview" />
          </div>
        </div>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="John Nolan" />
        </div>

        <div class="form-group">
          <label>Rank</label>
          <select id="rank">
            <option>Police Officer I</option>
            <option selected>Police Officer II</option>
            <option>Police Officer III</option>
            <option>Detective I</option>
            <option>Detective II</option>
            <option>Detective III</option>
            <option>Sergeant I</option>
            <option>Sergeant II</option>
            <option>Lieutenant I</option>
            <option>Lieutenant II</option>
            <option>Captain I</option>
            <option>Captain II</option>
            <option>Captain III</option>
            <option>Commander</option>
            <option>Deputy Chief</option>
            <option>Assistant Chief of Police</option>
            <option>Chief of Police</option>
          </select>
        </div>

        <div class="form-group">
          <label>Division</label>
          <select id="division">
            <option>Patrol Division</option>
            <option>Detective Bureau</option>
            <option>Metropolitan Division</option>
            <option>SWAT</option>
            <option>Traffic Division</option>
            <option>Air Support Division</option>
            <option>Gang and Narcotics Division</option>
            <option>Internal Affairs Division</option>
            <option>Major Crimes Division</option>
          </select>
        </div>

        <div style="display: flex; gap: 10px">
          <div class="form-group" style="flex: 1"><label>Serial #</label><input type="text" id="serial" placeholder="14036" /></div>
          <div class="form-group" style="flex: 1"><label>Badge #</label><input type="text" id="badge" placeholder="10051" /></div>
        </div>

        <div style="display: flex; gap: 10px">
          <div class="form-group" style="flex: 1">
            <label>Ethnicity</label>
            <select id="ethnicity">
              <option>White</option>
              <option>Black</option>
              <option>Hispanic</option>
              <option>Asian</option>
              <option>Middle Eastern</option>
              <option>Native American</option>
              <option>Mixed</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group" style="flex: 1">
            <label>Gender</label>
            <select id="gender">
              <option>Male</option>
              <option>Female</option>
              <option>Non-binary</option>
            </select>
          </div>
        </div>

        <div style="display: flex; gap: 10px">
          <div class="form-group" style="flex: 1"><label>Current Age</label><input type="number" id="age" placeholder="35" min="21" max="75" /></div>
          <div class="form-group" style="flex: 1">
            <label>Year Hired</label
            ><select id="yearHired"></select>
          </div>
        </div>

        <div style="display: flex; gap: 10px">
          <div class="form-group" style="flex: 1"><label>Height</label><input type="text" id="height" placeholder='6&#39;3"' /></div>
          <div class="form-group" style="flex: 1"><label>Weight (lbs)</label><input type="text" id="weight" placeholder="207" /></div>
        </div>

        <div class="form-group" style="margin-top: 6px">
          <label>Payments</label>
          <button class="btn-random" onclick="randomizePay()">&#127922; Randomize Pay</button>
        </div>

        <div style="display: flex; gap: 8px">
          <div class="form-group" style="flex: 1"><label>Regular Pay</label><input type="text" id="payRegular" placeholder="$0.00" /></div>
          <div class="form-group" style="flex: 1"><label>Overtime Pay</label><input type="text" id="payOvertime" placeholder="$0.00" /></div>
        </div>
        <div style="display: flex; gap: 8px">
          <div class="form-group" style="flex: 1"><label>Other Pay</label><input type="text" id="payOther" placeholder="$0.00" /></div>
          <div class="form-group" style="flex: 1"><label>Health Benefits</label><input type="text" id="payHealth" placeholder="$0.00" /></div>
        </div>
        <div class="form-group"><label>Retirement Pay</label><input type="text" id="payRetirement" placeholder="unknown" /></div>

        <button class="btn-generate" onclick="generateCard()">GENERATE CARD</button>
      </div>

      <div class="preview-panel">
        <h2>Preview</h2>
        <canvas id="cardCanvas" width="840" height="680"></canvas>
        <button class="btn-download" id="downloadBtn" onclick="downloadCard()">&#11015; Download PNG</button>
      </div>
    </div>

    <script>
      const yearSel = document.getElementById("yearHired");
      for (let y = 2026; y >= 1980; y--) {
        const o = document.createElement("option");
        o.value = y;
        o.text = y;
        yearSel.appendChild(o);
      }

      let photoDataURL = null;

      function previewPhoto(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          photoDataURL = ev.target.result;
          const prev = document.getElementById("photoPreview");
          prev.src = photoDataURL;
          prev.style.display = "block";
          document.getElementById("uploadText").textContent = file.name;
        };
        reader.readAsDataURL(file);
      }

      function fmt(n) {
        return "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function randomizePay() {
        const rank = document.getElementById("rank").value;
        const senior = [
          "Lieutenant I",
          "Lieutenant II",
          "Captain I",
          "Captain II",
          "Captain III",
          "Commander",
          "Deputy Chief",
          "Assistant Chief of Police",
          "Chief of Police",
        ];
        const mid = ["Sergeant I", "Sergeant II", "Detective I", "Detective II", "Detective III"];
        let base;
        if (senior.includes(rank)) base = 130000 + Math.random() * 60000;
        else if (mid.includes(rank)) base = 95000 + Math.random() * 40000;
        else base = 70000 + Math.random() * 50000;
        const ot = base * (0.5 + Math.random() * 0.5);
        const other = 5000 + Math.random() * 20000;
        const health = 18000 + Math.random() * 10000;
        document.getElementById("payRegular").value = fmt(base);
        document.getElementById("payOvertime").value = fmt(ot);
        document.getElementById("payOther").value = fmt(other);
        document.getElementById("payHealth").value = fmt(health);
        document.getElementById("payRetirement").value = "unknown";
      }

      function calcTotal() {
        const fields = ["payRegular", "payOvertime", "payOther", "payHealth"];
        let total = 0;
        fields.forEach((id) => {
          const v = document.getElementById(id).value.replace(/[$,]/g, "");
          const n = parseFloat(v);
          if (!isNaN(n)) total += n;
        });
        return total > 0 ? fmt(total) : "N/A";
      }

      function generateCard() {
        const canvas = document.getElementById("cardCanvas");
        const ctx = canvas.getContext("2d");

        const W = 840,
          H = 680;
        canvas.width = W;
        canvas.height = H;

        const name = document.getElementById("fullName").value || "John Nolan";
        const rank = document.getElementById("rank").value;
        const division = document.getElementById("division").value;
        const serial = document.getElementById("serial").value || "00000";
        const badge = document.getElementById("badge").value || "00000";
        const ethnicity = document.getElementById("ethnicity").value;
        const gender = document.getElementById("gender").value;
        const age = document.getElementById("age").value || "??";
        const yearHired = document.getElementById("yearHired").value;
        const height = document.getElementById("height").value || "??";
        const weight = document.getElementById("weight").value || "??";
        const payReg = document.getElementById("payRegular").value || "N/A";
        const payOT = document.getElementById("payOvertime").value || "N/A";
        const payOther = document.getElementById("payOther").value || "N/A";
        const payHealth = document.getElementById("payHealth").value || "N/A";
        const payRet = document.getElementById("payRetirement").value || "unknown";
        const total = calcTotal();
        const year = new Date().getFullYear() - 1;
        const email = serial + "@lspd.online";

        const photoW = 356,
          photoH = H - 48,
          photoX = 24,
          photoY = 24;
        const rx = photoX + photoW + 20;
        const rw = W - rx - 20;

        function drawCard() {
          ctx.fillStyle = "#f5f0dc";
          ctx.fillRect(0, 0, W, H);
          ctx.strokeStyle = "#c8b97a";
          ctx.lineWidth = 6;
          ctx.strokeRect(6, 6, W - 12, H - 12);

          ctx.fillStyle = "#bbb";
          ctx.fillRect(photoX, photoY, photoW, photoH);

          if (photoDataURL) {
            const img = new Image();
            img.onload = () => {
              const ratio = img.width / img.height;
              const areaR = photoW / photoH;
              let sx, sy, sw, sh;
              if (ratio > areaR) {
                sh = img.height;
                sw = sh * areaR;
                sx = (img.width - sw) / 2;
                sy = 0;
              } else {
                sw = img.width;
                sh = sw / areaR;
                sx = 0;
                sy = (img.height - sh) / 2;
              }
              ctx.drawImage(img, sx, sy, sw, sh, photoX, photoY, photoW, photoH);
              drawText();
            };
            img.src = photoDataURL;
          } else {
            ctx.fillStyle = "#888";
            ctx.font = "22px 'Courier New', monospace";
            ctx.textAlign = "center";
            ctx.fillText("No Photo", photoX + photoW / 2, photoY + photoH / 2);
            drawText();
          }
        }

        function lv(label, val, x, y) {
          ctx.font = "bold 20px 'Courier New', monospace";
          ctx.fillStyle = "black";
          ctx.textAlign = "left";
          ctx.fillText(label + ": ", x, y);
          const lw = ctx.measureText(label + ": ").width;
          ctx.font = "20px 'Courier New', monospace";
          ctx.fillStyle = "#111";
          ctx.fillText(val, x + lw, y);
        }

        function drawText() {
          ctx.textAlign = "center";
          ctx.font = "bold 46px 'Courier New', monospace";
          ctx.fillStyle = "#111";
          ctx.fillText(name.toUpperCase(), rx + rw / 2, 56);

          let y = 100;
          const lh = 32;

          lv("Rank", rank, rx, y);
          y += lh;
          lv("Division", division, rx, y);
          y += lh;
          lv("Email", email, rx, y);
          y += lh + 8;

          lv("Serial", serial, rx, y);
          lv("Badge", badge, rx + 210, y);
          y += lh;
          lv("Ethnicity", ethnicity, rx, y);
          lv("Gender", gender, rx + 210, y);
          y += lh;
          lv("Current Age", age, rx, y);
          lv("Year Hired", yearHired, rx + 210, y);
          y += lh;
          lv("Height", height, rx, y);
          lv("Weight", weight + " lbs", rx + 210, y);
          y += lh + 12;

          // Payments box
          const bx = rx,
            by = y,
            bw = rw,
            bh = 256;
          ctx.fillStyle = "#e8e0c8";
          ctx.strokeStyle = "#b8a96a";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(bx, by, bw, bh, 8);
          ctx.fill();
          ctx.stroke();

          ctx.font = "bold 17px 'Courier New', monospace";
          ctx.fillStyle = "#333";
          ctx.textAlign = "left";
          ctx.fillText("PAYMENTS FOR  " + year + "  " + (year - 1) + "  " + (year - 2), bx + 16, by + 26);
          const uw = ctx.measureText("PAYMENTS FOR  ").width;
          ctx.fillStyle = "#111";
          ctx.fillRect(bx + 16 + uw, by + 30, ctx.measureText(year + "").width, 3);

          let py = by + 60;
          const plh = 36;

          function pl(label, val) {
            ctx.font = "bold 22px 'Courier New', monospace";
            ctx.fillStyle = "#333";
            ctx.textAlign = "left";
            ctx.fillText("\u2022 " + label + ": ", bx + 16, py);
            const lw = ctx.measureText("\u2022 " + label + ": ").width;
            ctx.font = "22px 'Courier New', monospace";
            ctx.fillStyle = "#111";
            ctx.fillText(val, bx + 16 + lw, py);
            py += plh;
          }

          pl("Regular Pay", payReg);
          pl("Overtime Pay", payOT);
          pl("Other Pay", payOther);
          pl("Health Benefits", payHealth);
          pl("Retirement Pay", payRet);

          ctx.font = "bold 23px 'Courier New', monospace";
          ctx.fillStyle = "#111";
          ctx.fillText("\u2022 " + year + " TOTAL: " + total, bx + 16, py);

          // Misconduct button
          const mx = rx,
            my = H - 64,
            mw = rw,
            mh = 44;
          ctx.fillStyle = "#d8d0b8";
          ctx.strokeStyle = "#aaa";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(mx, my, mw, mh, 6);
          ctx.fill();
          ctx.stroke();
          ctx.font = "bold 16px 'Courier New', monospace";
          ctx.fillStyle = "#444";
          ctx.textAlign = "center";
          ctx.fillText("SEARCH MISCONDUCT RECORDS", mx + mw / 2, my + 28);

          document.getElementById("downloadBtn").style.display = "block";
        }

        drawCard();
      }

      function downloadCard() {
        const canvas = document.getElementById("cardCanvas");
        const a = document.createElement("a");
        a.download = "officer_card.png";
        a.href = canvas.toDataURL("image/png");
        a.click();
      }

      randomizePay();
    </script>
  </body>
</html>
